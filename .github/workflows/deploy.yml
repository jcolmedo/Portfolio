name: Deploy to GitHub Pages

on:
  # Activa este workflow en los pushes a la rama donde tengas el código (ej. main o la rama de v2)
  push:
    branches: [ main, v2-astro ]
  # Permite ejecutar este workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # with:
          # path: . # Si tu proyecto de astro NO está en la raíz de tu repositorio, descomenta esta línea y pon el path de tu carpeta

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
